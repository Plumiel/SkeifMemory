<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory Match vs Adversary</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="game-grounds">
            <div id="turn-indicator">Your Turn!</div>
            <div id="reward-indicator"></div>

            <div class="npc-zone" id="npc-under"></div>
            <div class="npc-zone" id="npc-over"></div>

            <div class="score-zone" id="aya-collection">
                <div class="collection-grid" id="aya-tiles"></div>
            </div>

            <div id="menu-zone">
                <p>Welcome to the tavern! Care to play a little game?</p>
                <button id="start-game" class="btn btn-dark">Let's go</button>
            </div>
            <button id="restart-game" class="btn btn-dark" style="display: none; position:absolute; z-index: 20;">Restart Game</button>

            <div class="memory-game" id="game-board"></div>

            <div class="score-zone" id="player-collection">
                <div class="collection-grid" id="player-tiles"></div>
            </div>
    </div>

    <script src="GameLogicPer.js" type="module"></script>
</body>
</html>
